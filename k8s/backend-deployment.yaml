apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: stayflow-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/per5ect/stayflow-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: stayflow-config
            - secretRef:
                name: stayflow-secret
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
