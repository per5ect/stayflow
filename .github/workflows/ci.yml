name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: stayflow_test
          POSTGRES_USER: stayflow
          POSTGRES_PASSWORD: stayflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U stayflow -d stayflow_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_URL: jdbc:postgresql://localhost:5432/stayflow_test
      DB_TEST_URL: jdbc:postgresql://localhost:5432/stayflow_test
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      CLOUD_NAME: ${{ secrets.CLOUD_NAME }}
      CLOUD_API_KEY: ${{ secrets.CLOUD_API_KEY }}
      CLOUD_API_SECRET: ${{ secrets.CLOUD_API_SECRET }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Static analysis (Checkstyle)
        run: ./mvnw -q checkstyle:check

      - name: Build and test (unit + integration)
        run: ./mvnw -q clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports
          if-no-files-found: error

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco
          if-no-files-found: error

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stayflow-backend:latest
            ghcr.io/${{ github.repository_owner }}/stayflow-backend:${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
          tags: |
            ghcr.io/${{ github.repository_owner }}/stayflow-frontend:latest
            ghcr.io/${{ github.repository_owner }}/stayflow-frontend:${{ github.sha }}

  deploy-coverage:
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download JaCoCo report artifact
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: ./public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: stayflow-staging

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and load images into kind
        run: |
          docker pull ghcr.io/per5ect/stayflow-backend:${{ github.sha }}
          docker pull ghcr.io/per5ect/stayflow-frontend:${{ github.sha }}
          kind load docker-image ghcr.io/per5ect/stayflow-backend:${{ github.sha }} --name stayflow-staging
          kind load docker-image ghcr.io/per5ect/stayflow-frontend:${{ github.sha }} --name stayflow-staging

      - name: Update image tags
        run: |
          sed -i "s|stayflow-backend:latest|stayflow-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|stayflow-frontend:latest|stayflow-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Create k8s secret
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl create secret generic stayflow-secret \
            --namespace=stayflow-staging \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }} \
            --from-literal=ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
            --from-literal=MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
            --from-literal=MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
            --from-literal=CLOUD_NAME=${{ secrets.CLOUD_NAME }} \
            --from-literal=CLOUD_API_KEY=${{ secrets.CLOUD_API_KEY }} \
            --from-literal=CLOUD_API_SECRET=${{ secrets.CLOUD_API_SECRET }}

      - name: Deploy to staging
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/postgres -n stayflow-staging --timeout=60s
          kubectl rollout status deployment/backend -n stayflow-staging --timeout=180s
          kubectl rollout status deployment/frontend -n stayflow-staging --timeout=60s

      - name: Show running pods
        run: kubectl get pods -n stayflow-staging

  release:
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Docker Images
            - `ghcr.io/per5ect/stayflow-backend:${{ github.ref_name }}`
            - `ghcr.io/per5ect/stayflow-frontend:${{ github.ref_name }}`

  deploy-production:
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: stayflow-production

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and load images into kind
        run: |
          docker pull ghcr.io/per5ect/stayflow-backend:${{ github.ref_name }}
          docker pull ghcr.io/per5ect/stayflow-frontend:${{ github.ref_name }}
          kind load docker-image ghcr.io/per5ect/stayflow-backend:${{ github.ref_name }} --name stayflow-production
          kind load docker-image ghcr.io/per5ect/stayflow-frontend:${{ github.ref_name }} --name stayflow-production

      - name: Update image tags and namespace
        run: |
          sed -i "s|stayflow-backend:latest|stayflow-backend:${{ github.ref_name }}|g" k8s/backend-deployment.yaml
          sed -i "s|stayflow-frontend:latest|stayflow-frontend:${{ github.ref_name }}|g" k8s/frontend-deployment.yaml
          sed -i "s|namespace: stayflow-staging|namespace: stayflow-production|g" k8s/*.yaml

      - name: Create k8s secret
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl create secret generic stayflow-secret \
            --namespace=stayflow-production \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }} \
            --from-literal=ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
            --from-literal=MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
            --from-literal=MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
            --from-literal=CLOUD_NAME=${{ secrets.CLOUD_NAME }} \
            --from-literal=CLOUD_API_KEY=${{ secrets.CLOUD_API_KEY }} \
            --from-literal=CLOUD_API_SECRET=${{ secrets.CLOUD_API_SECRET }}

      - name: Deploy to production
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/postgres -n stayflow-production --timeout=60s
          kubectl rollout status deployment/backend -n stayflow-production --timeout=120s
          kubectl rollout status deployment/frontend -n stayflow-production --timeout=60s

      - name: Show running pods
        run: kubectl get pods -n stayflow-production

